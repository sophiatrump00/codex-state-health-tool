# Copy to .local/profile.toml and edit for your machine.

codex_home = "C:\\Users\\YOUR_USER\\.codex"
target_provider = "openai"

# Recovery report generated by the rollout recovery step.
recovery_report = ".local\\recovery_assets\\rollout_recovery_report.json"

# Optional extra backup roots to scan in future recovery commands.
backup_roots = []

[projection]
# Only ready_original is allowed by default. Partial/sqlmaster-only threads stay
# outside Codex and remain readable from the recovery package.
allowed_statuses = ["ready_original"]
preserve_existing_partial_threads = true

[safety]
require_integrity_ok = true
require_real_rollout = true
snapshot_before_apply = true
